name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jsonschema pytest numpy
    - name: Run fast tests
      # Note: The slow end-to-end test tier (@pytest.mark.slow) is skipped here 
      # because it requires a full openEMS installation (including CSXCAD and 
      # engine binaries), which is not present in the default runner image.
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/ -v -m "not slow"
